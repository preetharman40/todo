name: Cross-Platform-Check

on: [push]

jobs:
  test-compatibility:
    runs-on: ${{ matrix.os }} # this variable comes from matrix
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - name: "Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: "Run Version Check"
        run: |
          echo "I am running on ${{ matrix.os }}"
          node -v


