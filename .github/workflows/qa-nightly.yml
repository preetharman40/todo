name: "QA Test"

on: workflow_dispatch

jobs:
  testcrashes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "app crahes and logs saved"
        run: echo 'CRITICAL ERROR=> Database timeout' > test-results.log && exit 1

  
  uploadLogFile:
    runs-on: ubuntu-latest
    needs: [testcrashes]
    if: always()
    steps:
      - name: "Upload log file to analyse"
        uses: actions/upload-artifact@v4
        with:
          name: testlogs
          path: test-results.log
        