name: "QA Test"

on: workflow_dispatch

jobs:
  test_and_upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "app crahes and logs saved"
        run: echo 'CRITICAL ERROR=> Database timeout' > test-results.log && exit 1

      
   
      - name: "Upload log file to analyse"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testlogs
          path: test-results.log

  
  
   
      
        